services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: kanbanboard
    volumes:
      - pgdata:/var/lib/postgresql

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VERSION: "1.2.2"
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: kanban
      DB_PASSWORD: kanban
      DB_NAME: kanbanboard
      PORT: 8080
      STATIC_DIR: /app/static

volumes:
  pgdata:
